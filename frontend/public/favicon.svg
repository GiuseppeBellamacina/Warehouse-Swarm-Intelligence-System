<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#111827"/>

  <!-- Warehouse grid lines -->
  <rect x="8"  y="8"  width="22" height="22" rx="2" fill="none" stroke="#374151" stroke-width="1.5"/>
  <rect x="34" y="8"  width="22" height="22" rx="2" fill="none" stroke="#374151" stroke-width="1.5"/>
  <rect x="8"  y="34" width="22" height="22" rx="2" fill="none" stroke="#374151" stroke-width="1.5"/>
  <rect x="34" y="34" width="22" height="22" rx="2" fill="none" stroke="#374151" stroke-width="1.5"/>

  <!-- Object in top-left cell (yellow box = item to retrieve) -->
  <rect x="13" y="13" width="12" height="12" rx="2" fill="#F59E0B" opacity="0.9"/>

  <!-- Object in bottom-right cell -->
  <rect x="39" y="39" width="12" height="12" rx="2" fill="#F59E0B" opacity="0.5"/>

  <!-- Scout agent (green dot) -->
  <circle cx="45" cy="19" r="5" fill="#10B981"/>
  <!-- Scout direction indicator -->
  <circle cx="45" cy="19" r="2.5" fill="#D1FAE5"/>

  <!-- Retriever agent (blue dot) -->
  <circle cx="19" cy="43" r="5" fill="#3B82F6"/>
  <circle cx="19" cy="43" r="2.5" fill="#DBEAFE"/>

  <!-- Coordinator agent (purple dot, slightly larger) -->
  <circle cx="32" cy="32" r="5.5" fill="#8B5CF6"/>
  <circle cx="32" cy="32" r="2.5" fill="#EDE9FE"/>

  <!-- Path line from retriever to object -->
  <line x1="19" y1="38" x2="19" y2="25" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>
</svg>
